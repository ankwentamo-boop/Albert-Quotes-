<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .card {
        background-color: aqua;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        width: 300px;
        padding: 10px;
        margin: 5px;
    }

    #comments {
        display: flex;
        flex-direction: row;
    }

    .btn {
        display: flex;
        justify-content: space-around;
        align-items: baseline;

        button {
            background-color: rgb(22, 151, 194);
            border-radius: 8px;
            border: none;
            width: 100px;
            height: 30px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.7;
        }
    }
</style>

<body>
    <div id="comments">

    </div>
    <button onclick="getData()">Get Data</button>
    <div id="data-container"></div>

    <script>
        let container = document.getElementById("comments");
        getData();
        async function getData() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/comments?_limit=5');
                const data = await response.json();
                return data.forEach(comment => {
                    container.innerHTML += `
                  <div class="card" id="comment-${comment.id}">
                    <h3> The comment name is: 
                    ${comment.name}</h3>
                    <p>${comment.body} </p>
                    <div class="btn">
                     <button onclick=editComment(${comment.id})>Edit</button>
                     <button onclick=deleteComment(${comment.id})>Delete</button>
                    </div>
                  </div>`;
                    console.log(comment);
                });
            }
            catch (error) {
                console.log("something went wrong");
            }
        }

        async function editComment(id) {
            try {
                const response = await fetch(`https://jsonplaceholder.typicode.com/comments/${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({
                        body: "This comment has been edited"
                    }),
                    headers: {
                        'Content-type': 'application/json; charset=UTF-8',
                    }
                });
                const data = await response.json();
                return alert("Comment edited succesfully....")
            }
            catch (error) {
                console.log("Something went wrong");
            }
        }


        async function deleteComment(id) {
            try {
                const response = await fetch(`https://jsonplaceholder.typicode.com/comments/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                return document.getElementById(`comment-${id}`).remove(id);
            }
            catch (error) {
                console.log("Something went wrong");
            }

        }
    </script>
</body>

</html>
