<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 24px;
        background: linear-gradient(135deg, #f5f7ff, #eef2ff);
        color: #2d3748;
    }

    .container {
        max-width: 460px;
        padding: 22px;
        margin-bottom: 16px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        min-height: 90px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 17px;
        color: #4a5568;
        border: 1px solid #e2e8f0;
    }

    .textarea {
        margin: 16px 0;
        max-width: 460px;
    }

    .hidden {
        display: none;
    }

    textarea {
        width: 100%;
        min-height: 110px;
        padding: 12px 14px;
        border: 1px solid #cbd5e0;
        border-radius: 12px;
        resize: vertical;
        font-size: 15px;
        box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        outline: none;
    }

    textarea:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    button {
        padding: 10px 16px;
        margin-right: 10px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #4f46e5, #6366f1);
        color: white;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
    }

    button:hover {
        transform: translateY(-1px);
        opacity: 0.95;
    }
</style>

<body>
    <div class="container">

    </div>

    <div class="textarea"></div>
    <button onclick="getComment()">Get comment</button>
    <button id="editButton" onclick="showTextarea()">Edit Comment</button>
    <script>
        const containerEl = document.querySelector(".container");
        const textArea = document.querySelector(".textarea");
        const editButton = document.getElementById("editButton");
        const comments = [
            "My name is Nkwentamo Kamdem Albert",
            "I school in mada International College",
            "My sister is Nkwentamo Ngweteka Aline"
        ];

        function getComment() {
            const randomIndex = Math.floor(Math.random() * comments.length);
            containerEl.textContent = comments[randomIndex];
        }

        function showTextarea() {
            editButton.classList.add("hidden");
            textArea.innerHTML = `
            <textarea id="commentInput" placeholder="Type your comment"></textarea>
            <div style="display: flex; gap: 10px; padding-bottom: 30px; margin-top: 10px;">
              <button type="button" onclick="addComment()">Keep Comment</button>
              <button type="button" onclick="discardComment()">Discard Comment</button>
            </div>`;
        }

        function addComment() {
            const commentInput = document.getElementById("commentInput");
            const newComment = commentInput ? commentInput.value.trim() : "";

            if (newComment) {
                comments.push(newComment);
                containerEl.textContent = newComment;
                commentInput.value = "";
                textArea.innerHTML = "";
                editButton.classList.remove("hidden");
            }
        }

        function discardComment() {
            const commentInput = document.getElementById("commentInput");
            if (commentInput) {
                commentInput.value = "";
            }
            textArea.innerHTML = "";
            editButton.classList.remove("hidden");
        }
    </script>
</body>

</html>
