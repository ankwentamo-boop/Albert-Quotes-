<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .card {
        background-color: aqua;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        width: 300px;
        padding: 10px;
        margin: 5px;
    }

    #comments {
        display: flex;
        flex-direction: row;
    }

    .posts{
        display: flex;
    }

    .btn {
        display: flex;
        justify-content: space-around;
        align-items: baseline;

        button {
            background-color: rgb(22, 151, 194);
            border-radius: 8px;
            border: none;
            width: 100px;
            height: 30px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.7;
        }
    }
</style>

<body>
    <div class="posts">

    </div>
    <button onclick="getPost()">Get Post</button>
    <div class="data-container"></div>

    <script>
        const container = document.querySelector(".posts");
        async function getPost() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/users/1/posts?_limit=5')
                const data = await response.json();
                console.log(data);
                return data.forEach(post => {
                    container.innerHTML += `
                    <div class="card id="post-${post.id}">
                        <h2>The post name is: ${post.title}</h2>
                        <p>${post.body}</p>
                        <div class="btn">
                            <button onclick=editPost(${post.id})>Edit Post</button>
                            <button onclick=editPost(${post.id})>delete Post</button>
                        </div>
                    </div>`
                    console.log(post);
                });

            } catch (error) {
                console.log("Something Went wrong");
            }
        }
        getPost()

    </script>
</body>

</html>
